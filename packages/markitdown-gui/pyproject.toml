[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-gui"
version = "0.1.0"
description = "Desktop GUI for MarkItDown — batch convert documents to Markdown"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "MarkItDown GUI Contributors" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: X11 Applications :: Qt",
  "Environment :: Win32 (MS Windows)",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "markitdown[all]",
  "PySide6>=6.6",
  "pywin32; sys_platform == 'win32'",
]

[project.scripts]
markitdown-gui = "markitdown_gui.__main__:main"

[tool.hatch.build.targets.sdist]
only-include = ["src/markitdown_gui"]

[tool.hatch.build.targets.wheel]
packages = ["src/markitdown_gui"]

[tool.hatch.build.targets.wheel.force-include]
"src/markitdown_gui/i18n/en.json" = "markitdown_gui/i18n/en.json"
"src/markitdown_gui/i18n/zh.json" = "markitdown_gui/i18n/zh.json"
"src/markitdown_gui/resources/styles_dark.qss" = "markitdown_gui/resources/styles_dark.qss"
"src/markitdown_gui/resources/styles_light.qss" = "markitdown_gui/resources/styles_light.qss"
